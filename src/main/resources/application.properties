# ===== SERVER =====
server.port=${PORT:8080}
spring.application.name=bharatpos-backend

# ===== DATABASE =====
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=false

# ===== JWT =====
bharatpos.jwt.secret=${JWT_SECRET}
bharatpos.jwt.expiration=900000
bharatpos.jwt.refresh-expiration=604800000

# ===== CORS =====
bharatpos.cors.allowed-origins=${CORS_ORIGINS}

# ===== RAZORPAY =====
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:webhook_secret}

# ===== WHATSAPP META API =====
whatsapp.api.url=https://graph.facebook.com/v18.0
whatsapp.api.token=${WHATSAPP_API_TOKEN:placeholder}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:placeholder}

# ===== EMAIL =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@bharatpos.in}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===== ASYNC =====
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# ===== LOGGING =====
logging.level.com.bharatpos=INFO
logging.level.org.springframework.security=WARN